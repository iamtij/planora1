services:
  db:
    image: postgres:16-alpine
    # Host 5433 avoids clashing with Homebrew / local Postgres on 5432 (wrong server = "role postgres does not exist").
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: planorama
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d planorama"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s

volumes:
  postgres_data:

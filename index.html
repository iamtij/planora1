<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planorama Studios | Life-Size Architectural Visualization</title>
    <link rel="icon" type="image/png" href="/planoramaph.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bauhaus: {
                            red: '#df2020',
                            blue: '#005eb8',
                            yellow: '#ffcd00',
                            black: '#000000',
                            white: '#ffffff',
                            beige: '#fcfcf9'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    letterSpacing: {
                        'architect': '0.2em',
                        'bauhaus': '-0.04em'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #ffffff;
            color: #000000;
            cursor: crosshair;
        }
        .architectural-grid {
            background-image: 
                linear-gradient(to right, #f0f0f0 1px, transparent 1px),
                linear-gradient(to bottom, #f0f0f0 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .hairline-border {
            border: 0.5px solid rgba(0,0,0,0.1);
        }
        .perspective-\[1200px\] {
            perspective: 1200px;
        }
        .preserve-3d {
            transform-style: preserve-3d;
        }
        ::selection {
            background: #ffcd00;
            color: #000;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "lucide-react": "https://esm.sh/lucide-react@^0.561.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
</head>
<body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
